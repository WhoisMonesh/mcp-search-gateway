# ============================================================
# Local Dev Stack: Elasticsearch + Kibana + MCP Server
# Usage: docker compose -f examples/docker-compose/elasticsearch-mcp.yml up -d
# MCP API: http://localhost:8080  |  Kibana: http://localhost:5601
# ============================================================

version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5602:5601"

  mcp:
    image: ghcr.io/whoismonesh/mcp-search-gateway:latest
    container_name: mcp-server-es
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - MCP_CONFIG=/config/elasticsearch.local.yaml
      # - ELASTICSEARCH_URL=http://elasticsearch:9200
      # - ELASTICSEARCH_USERNAME=elastic
      # - ELASTICSEARCH_PASSWORD=changeme
    volumes:
      - ../../config:/config:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  elasticsearch-data:
    driver: local
