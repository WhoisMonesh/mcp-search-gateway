# ============================================================
# Local Dev Stack: OpenSearch + OpenSearch Dashboards + MCP Server
# Usage: docker compose -f examples/docker-compose/opensearch-mcp.yml up -d
# MCP API available at: http://localhost:8080
# Dashboards available at: http://localhost:5601
# ============================================================

version: "3.8"

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@1234
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  mcp:
    image: ghcr.io/whoismonesh/mcp-search-gateway:latest
    container_name: mcp-server
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - MCP_CONFIG=/config/opensearch.local.yaml
      # Override individual settings via env vars if needed:
      # - OPENSEARCH_URL=http://opensearch:9200
      # - OPENSEARCH_USERNAME=admin
      # - OPENSEARCH_PASSWORD=Admin@1234
      # - MCP_READ_ONLY=false
    volumes:
      - ../../config:/config:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  opensearch-data:
    driver: local
